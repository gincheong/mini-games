<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- background -->
  <rect width="32" height="32" rx="6" fill="#0f172a"/>

  <!-- controller body -->
  <rect x="3" y="8" width="26" height="15" rx="4" fill="#7c3aed"/>

  <!-- left grip -->
  <rect x="3" y="17" width="8" height="9" rx="3" fill="#7c3aed"/>
  <!-- right grip -->
  <rect x="21" y="17" width="8" height="9" rx="3" fill="#7c3aed"/>

  <!-- D-pad horizontal -->
  <rect x="7" y="15" width="7" height="3" rx="1" fill="#c4b5fd"/>
  <!-- D-pad vertical -->
  <rect x="9" y="13" width="3" height="7" rx="1" fill="#c4b5fd"/>
  <!-- D-pad center (overlap fix) -->
  <rect x="9" y="15" width="3" height="3" fill="#c4b5fd"/>

  <!-- ABXY buttons -->
  <circle cx="22" cy="12" r="2" fill="#f43f5e"/>
  <circle cx="26" cy="16" r="2" fill="#f59e0b"/>
  <circle cx="18" cy="16" r="2" fill="#10b981"/>
  <circle cx="22" cy="20" r="2" fill="#3b82f6"/>

  <!-- center button -->
  <rect x="14" y="14" width="4" height="2" rx="1" fill="#ddd6fe"/>
</svg>
